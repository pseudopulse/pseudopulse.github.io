<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Manifest Creator</title>
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
    </head>

    <link rel="stylesheet" href="index.css">

    <body>
        <script src="index.js"></script>

        <div class="container-div center">
            <div class="group">
                <div class="floatbox">
                    <textarea id="modname" placeholder="Mod Name" value="" class="text-input" ></textarea>
                </div>
                <div class="floatbox">
                    <textarea id="modvers" placeholder="Mod Version" value="" class="text-input" ></textarea>
                </div>
                <div class="floatbox">
                    <textarea id="modwebsite" placeholder="Website URL" value="" class="text-input"></textarea>
                </div>
                <div class="floatbox">
                    <textarea id="moddesc" placeholder="Mod Description" value="" class="text-input"></textarea>
                </div>
                <div class="floatbox">
                    <textarea id="moddeps" placeholder="Dependency Strings" value="" class="text-deps"></textarea>
                </div>

                <div class="floatbox">
                    <input type="button" value="Create" id="enter" class="enter" onclick="onClick(event)">
                </div>
            </div>

            <div class="floatbox">
                <textarea id="output" placeholder="Output Manifest" value="" class="text-output" disabled="disabled"></textarea>
            </div>
            
        </div>
    </body>
</html>
